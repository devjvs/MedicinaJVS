<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>25.2 Mapa Mental - Sistemas Sensoriais</title>
  <style>
    :root { --bg:#0f172a; --panel:#111827; --card:#ffffff; --text:#0f172a; --muted:#64748b; --accent:#14b8a6; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,Segoe UI,Arial,sans-serif; background:#e7eef7; color:var(--text); }
    header { position:sticky; top:0; z-index:20; background:rgba(15,23,42,.96); color:#fff; box-shadow:0 10px 30px rgba(15,23,42,.24); }
    .bar { max-width:1280px; margin:0 auto; display:flex; gap:12px; align-items:center; justify-content:space-between; padding:12px 16px; }
    .title { min-width:0; } h1 { font-size:16px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sub { font-size:12px; color:#cbd5e1; margin-top:2px; }
    .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; align-items:center; }
    button, select { border:1px solid rgba(255,255,255,.16); background:#1e293b; color:#fff; border-radius:999px; padding:8px 12px; font-weight:700; cursor:pointer; }
    button:hover, select:hover { background:#334155; }
    .layout { display:grid; grid-template-columns:260px 1fr; min-height:calc(100vh - 64px); }
    aside { background:#f8fafc; border-right:1px solid #dbe3ef; padding:18px 14px; position:sticky; top:64px; height:calc(100vh - 64px); overflow:auto; }
    .toc-title { font-weight:900; font-size:13px; color:#334155; margin:0 0 10px; }
    .toc button { display:block; width:100%; text-align:left; color:#0f172a; background:#fff; border:1px solid #e2e8f0; margin:6px 0; border-radius:14px; padding:10px 12px; box-shadow:0 4px 10px rgba(15,23,42,.04); }
    .toc button.active { border-color:var(--accent); box-shadow:0 0 0 2px rgba(20,184,166,.18); }
    main { padding:22px; } .page-wrap { display:flex; flex-direction:column; align-items:center; gap:18px; }
    .page-card { width:min(100%, calc(var(--zoom, 1) * 1100px)); background:#fff; border-radius:18px; box-shadow:0 18px 45px rgba(15,23,42,.18); border:1px solid #dbe3ef; overflow:hidden; }
    .page-label { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; font-size:12px; color:#475569; border-bottom:1px solid #e2e8f0; background:#f8fafc; font-weight:800; }
    img.page { display:block; width:100%; height:auto; background:#fff; }
    .focus aside { display:none; } .focus .layout { display:block; } .focus main { padding:12px; } .focus .page-card { width:min(100%, calc(var(--zoom, 1) * 1280px)); }
    @media (max-width: 900px) { .layout { display:block; } aside { position:relative; top:auto; height:auto; max-height:220px; border-right:0; border-bottom:1px solid #dbe3ef; } .bar { align-items:flex-start; flex-direction:column; } .controls { justify-content:flex-start; } main { padding:12px; } }
  </style>
</head>
<body>
<script>const MANIFEST = {"title": "25.2 Mapa Mental - Sistemas Sensoriais", "source": "25.2 Mapa Mental - Sistemas Sensoriais.pdf", "pageCount": 4, "pages": ["assets/page-001.jpg", "assets/page-002.jpg", "assets/page-003.jpg", "assets/page-004.jpg"], "generated": "HTML limpo com remoção básica de ruídos visuais combinados."};</script>
<header><div class="bar"><div class="title"><h1 id="docTitle"></h1><div class="sub" id="docSub"></div></div><div class="controls"><button onclick="zoomOut()">- Zoom</button><button onclick="zoomIn()">+ Zoom</button><button onclick="resetZoom()">Ajustar</button><select id="pageSelect" onchange="goToPage(this.value)"></select><button onclick="toggleFocus()">Modo foco</button><button onclick="document.documentElement.requestFullscreen?.()">Tela cheia</button></div></div></header>
<div class="layout"><aside><p class="toc-title">Páginas</p><div class="toc" id="toc"></div></aside><main><div class="page-wrap" id="pages"></div></main></div>
<script>
const root = document.documentElement; let zoom = 1; docTitle.textContent = MANIFEST.title; docSub.textContent = `${MANIFEST.pageCount} páginas • ${MANIFEST.source || ''}`;
MANIFEST.pages.forEach((src, idx) => { const n = idx + 1; const opt = document.createElement('option'); opt.value = n; opt.textContent = `Página ${n}`; pageSelect.appendChild(opt); const b = document.createElement('button'); b.textContent = `Página ${n}`; b.onclick = () => goToPage(n); b.id = `toc-${n}`; toc.appendChild(b); const card = document.createElement('section'); card.className = 'page-card'; card.id = `page-${n}`; card.innerHTML = `<div class="page-label"><span>Página ${n}</span><span>${MANIFEST.title}</span></div><img class="page" src="${src}" loading="lazy" alt="Página ${n}">`; pages.appendChild(card); });
function goToPage(n) { document.getElementById(`page-${n}`)?.scrollIntoView({behavior:'smooth', block:'start'}); pageSelect.value = n; } function setZoom(v) { zoom = Math.max(.65, Math.min(1.8, v)); root.style.setProperty('--zoom', zoom); } function zoomIn() { setZoom(zoom + .1); } function zoomOut() { setZoom(zoom - .1); } function resetZoom() { setZoom(1); } function toggleFocus() { document.body.classList.toggle('focus'); }
const observer = new IntersectionObserver((entries) => { const visible = entries.filter(e => e.isIntersecting).sort((a,b)=>b.intersectionRatio-a.intersectionRatio)[0]; if (!visible) return; const n = visible.target.id.replace('page-',''); pageSelect.value = n; document.querySelectorAll('.toc button').forEach(b => b.classList.remove('active')); document.getElementById(`toc-${n}`)?.classList.add('active'); }, {threshold:[0.25,0.5,0.75]}); document.querySelectorAll('.page-card').forEach(el => observer.observe(el));
</script></body></html>
