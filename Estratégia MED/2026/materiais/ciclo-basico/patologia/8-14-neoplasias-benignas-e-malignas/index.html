iv><section class="viewer-wrap"><div class="page-shell" id="pageShell"><div class="page-card"><img id="pageImg" class="page-img" alt="Página do material"></div><div class="footer-note" id="footerNote"></div></div></section></main></div><script>const manifest=window.MANIFEST;let page=0,zoom=1;const img=document.getElementById('pageImg'),list=document.getElementById('pageList'),statusEl=document.getElementById('status'),footer=document.getElementById('footerNote'),shell=document.getElementById('pageShell');function buildList(){list.innerHTML='';manifest.pages.forEach((p,i)=>{const b=document.createElement('button');b.className='page-item';b.textContent=`Página ${String(i+1).padStart(2,'0')}`;b.onclick=()=>goTo(i);list.appendChild(b)})}function render(){img.src=manifest.pages[page];statusEl.textContent=`Página ${page+1} de ${manifest.pages.length}`;footer.textContent=`${manifest.title} · Página ${page+1}`;[...list.children].forEach((b,i)=>b.classList.toggle('active',i===page));shell.style.setProperty('--zoom',zoom.toFixed(2));const next=manifest.pages[page+1];if(next){const im=new Image();im.src=next}}function goTo(i){page=Math.max(0,Math.min(manifest.pages.length-1,i));render();document.getElementById('sidebar').classList.remove('open');window.scrollTo({top:0,behavior:'smooth'})}function nextPage(){goTo(page+1)}function prevPage(){goTo(page-1)}function zoomIn(){zoom=Math.min(2.25,zoom+.15);render()}function zoomOut(){zoom=Math.max(.55,zoom-.15);render()}function resetZoom(){zoom=1;render()}function toggleMenu(){document.getElementById('sidebar').classList.toggle('open')}function toggleFull(){if(!document.fullscreenElement){document.documentElement.requestFullscreen?.()}else{document.exitFullscreen?.()}}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextPage();if(e.key==='ArrowLeft')prevPage();if(e.key==='+')zoomIn();if(e.key==='-')zoomOut()});buildList();render();</script></body></html>
