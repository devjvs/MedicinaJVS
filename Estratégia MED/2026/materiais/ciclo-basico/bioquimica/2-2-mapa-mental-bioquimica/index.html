<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2.2 - Mapa Mental - Bioquímica</title><style>
:root{--bg:#f3f7fb;--ink:#0f172a;--muted:#64748b;--line:#dbe7ef;--brand:#0f9fb0;--brand2:#087f92;--shadow:0 18px 45px rgba(15,23,42,.14)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:310px 1fr}aside{background:linear-gradient(180deg,#fff,#eef8fb);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}.brand{padding:22px 20px 16px;border-bottom:1px solid var(--line)}.eyebrow{color:var(--brand2);font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}h1{font-size:22px;line-height:1.08;margin:8px 0 10px}.pill{display:inline-flex;background:#e2f6f8;border:1px solid #b8e9ef;color:#075c68;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:850;margin-right:6px}.thumbs{padding:14px;overflow:auto;display:grid;gap:12px}.thumb{border:1px solid var(--line);border-radius:18px;padding:8px;background:rgba(255,255,255,.72);cursor:pointer;text-align:left;transition:.18s;box-shadow:0 6px 16px rgba(15,23,42,.06)}.thumb:hover{transform:translateY(-1px);border-color:#8bdde6}.thumb.active{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,159,176,.16),0 12px 25px rgba(15,23,42,.11)}.thumb img{width:100%;display:block;border-radius:12px;background:#fff}.thumb span{display:block;margin-top:7px;color:var(--muted);font-size:12px;font-weight:800}main{min-width:0;height:100vh;display:flex;flex-direction:column}.toolbar{min-height:74px;display:flex;gap:10px;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.86);backdrop-filter:blur(12px)}.toolbar-left,.toolbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}button{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:14px;min-height:42px;padding:0 13px;font-weight:800;cursor:pointer;box-shadow:0 4px 12px rgba(15,23,42,.06)}button:hover{border-color:#93dce6}.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;border-color:transparent}.state{font-weight:900;color:#0f4d59;min-width:96px;text-align:center}.wrap{flex:1;min-height:0;overflow:auto;padding:24px}.stage{min-height:100%;display:grid;place-items:start center}.card img{width:calc(var(--page-width,1000px)*var(--zoom,1));max-width:none;display:block;border-radius:22px;box-shadow:var(--shadow);background:#fff}.mobile{display:none}.note{padding:12px 20px;color:var(--muted);font-size:12px;line-height:1.4;border-top:1px solid var(--line)}body.focus aside{display:none}body.focus .app{grid-template-columns:1fr}@media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100vh;grid-template-columns:1fr}aside{position:fixed;inset:0 auto 0 0;width:min(86vw,330px);z-index:5;transform:translateX(-104%);transition:.2s;box-shadow:var(--shadow)}body.menu-open aside{transform:translateX(0)}main{height:100vh}.mobile{display:inline-flex}.toolbar{align-items:stretch;flex-direction:column}.toolbar-left,.toolbar-right{justify-content:center}.wrap{padding:12px}.card img{border-radius:14px}}
</style></head><body><div class="app"><aside><div class="brand"><div class="eyebrow">Visualizador HTML</div><h1>2.2 - Mapa Mental - Bioquímica</h1><span class="pill" id="count"></span><span class="pill">versão limpa</span></div><div class="thumbs" id="thumbs"></div><div class="note">Use as setas do teclado para navegar. Zoom, modo foco e tela cheia estão disponíveis no topo.</div></aside><main><div class="toolbar"><div class="toolbar-left"><button class="mobile" onclick="menu()">☰ Páginas</button><button onclick="prev()">← Anterior</button><div class="state" id="state"></div><button onclick="next()">Próxima →</button></div><div class="toolbar-right"><button onclick="zout()">− Zoom</button><button onclick="zreset()" id="zlabel">100%</button><button onclick="zin()">+ Zoom</button><button onclick="focusMode()">Modo foco</button><button class="primary" onclick="fs()">Tela cheia</button></div></div><div class="wrap" id="wrap"><div class="stage"><div class="card" id="card"><img id="img" alt="Página do material"></div></div></div></main></div><script>
const PAGES=["assets/page-001.webp", "assets/page-002.webp", "assets/page-003.webp", "assets/page-004.webp", "assets/page-005.webp", "assets/page-006.webp", "assets/page-007.webp", "assets/page-008.webp", "assets/page-009.webp", "assets/page-010.webp"];const DIMS=[{"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}, {"w": 1350, "h": 760}];let cur=0,zoom=1;const img=document.getElementById('img'),state=document.getElementById('state'),thumbs=document.getElementById('thumbs'),card=document.getElementById('card'),wrap=document.getElementById('wrap'),zlabel=document.getElementById('zlabel');document.getElementById('count').textContent=PAGES.length+' páginas';function renderThumbs(){thumbs.innerHTML=PAGES.map((p,i)=>`<button class="thumb ${i===cur?'active':''}" onclick="go(${i})"><img loading="lazy" src="${p}" alt="Miniatura página ${i+1}"><span>Página ${String(i+1).padStart(2,'0')}</span></button>`).join('')}function render(){img.src=PAGES[cur];state.textContent=(cur+1)+' / '+PAGES.length;card.style.setProperty('--page-width',(DIMS[cur]?.w||1000)+'px');card.style.setProperty('--zoom',zoom);zlabel.textContent=Math.round(zoom*100)+'%';document.querySelectorAll('.thumb').forEach((e,i)=>e.classList.toggle('active',i===cur));wrap.scrollTo({top:0,left:0,behavior:'smooth'})}function go(i){cur=Math.max(0,Math.min(PAGES.length-1,i));render();document.body.classList.remove('menu-open')}function prev(){go(cur-1)}function next(){go(cur+1)}function zin(){zoom=Math.min(2.5,+(zoom+.1).toFixed(2));render()}function zout(){zoom=Math.max(.35,+(zoom-.1).toFixed(2));render()}function zreset(){zoom=1;render()}function focusMode(){document.body.classList.toggle('focus')}function menu(){document.body.classList.toggle('menu-open')}function fs(){if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();else document.exitFullscreen?.()}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key==='+')zin();if(e.key==='-')zout();if(e.key==='Escape')document.body.classList.remove('menu-open')});renderThumbs();render();
</script></body></html>
