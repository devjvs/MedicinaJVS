<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>29.4 - Anatomia do Trato Genital Feminino</title>
  <style>
    :root {
      --bg: #f3f7fb;
      --panel: rgba(255,255,255,.88);
      --ink: #0f172a;
      --muted: #64748b;
      --line: #dbe7ef;
      --brand: #0f9fb0;
      --brand-2: #087f92;
      --shadow: 0 18px 45px rgba(15, 23, 42, .14);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { overflow: hidden; }
    .app { height: 100vh; display: grid; grid-template-columns: 310px minmax(0, 1fr); }
    aside { border-right: 1px solid var(--line); background: linear-gradient(180deg, #ffffff 0%, #eef8fb 100%); min-height: 0; display: flex; flex-direction: column; }
    .brand { padding: 22px 20px 16px; border-bottom: 1px solid var(--line); }
    .eyebrow { color: var(--brand-2); font-size: 12px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
    h1 { font-size: 22px; line-height: 1.08; margin: 8px 0 10px; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; color: var(--muted); font-size: 13px; }
    .pill { background: #e2f6f8; border: 1px solid #b8e9ef; color: #075c68; border-radius: 999px; padding: 6px 10px; font-weight: 800; }
    .thumbs { padding: 14px; overflow: auto; display: grid; gap: 12px; }
    .thumb { border: 1px solid var(--line); border-radius: 18px; padding: 8px; background: rgba(255,255,255,.72); cursor: pointer; text-align: left; transition: .18s ease; box-shadow: 0 6px 16px rgba(15,23,42,.06); }
    .thumb:hover { transform: translateY(-1px); border-color: #8bdde6; }
    .thumb.active { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,159,176,.16), 0 12px 25px rgba(15,23,42,.11); }
    .thumb img { width: 100%; display: block; border-radius: 12px; background: #fff; }
    .thumb span { display: block; margin-top: 7px; color: var(--muted); font-size: 12px; font-weight: 800; }
    main { min-width: 0; height: 100vh; display: flex; flex-direction: column; }
    .toolbar { min-height: 74px; display: flex; gap: 10px; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.82); backdrop-filter: blur(12px); }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    button { border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 14px; min-height: 42px; padding: 0 13px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 12px rgba(15,23,42,.06); }
    button:hover { border-color: #93dce6; }
    .primary { background: linear-gradient(135deg, var(--brand), var(--brand-2)); color: #fff; border-color: transparent; }
    .page-state { font-weight: 900; color: #0f4d59; min-width: 96px; text-align: center; }
    .stage-wrap { flex: 1; min-height: 0; overflow: auto; padding: 24px; }
    .stage { min-height: 100%; display: grid; place-items: start center; }
    .page-card img { width: calc(var(--page-width, 1000px) * var(--zoom, 1)); max-width: none; display: block; border-radius: var(--radius); box-shadow: var(--shadow); background: #fff; }
    .mobile-menu { display: none; }
    .note { padding: 12px 20px; color: var(--muted); font-size: 12px; line-height: 1.4; border-top: 1px solid var(--line); }
    body.focus aside { display: none; }
    body.focus .app { grid-template-columns: 1fr; }
    body.focus .toolbar { background: rgba(255,255,255,.95); }
    @media (max-width: 900px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; grid-template-columns: 1fr; }
      aside { position: fixed; inset: 0 auto 0 0; width: min(86vw, 330px); z-index: 5; transform: translateX(-104%); transition: .2s ease; box-shadow: var(--shadow); }
      body.menu-open aside { transform: translateX(0); }
      main { height: 100vh; }
      .mobile-menu { display: inline-flex; }
      .toolbar { align-items: stretch; flex-direction: column; }
      .toolbar-left, .toolbar-right { justify-content: center; }
      .stage-wrap { padding: 12px; }
      .page-card img { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="eyebrow">Visualizador HTML</div>
        <h1>29.4 - Anatomia do Trato Genital Feminino</h1>
        <div class="meta"><span class="pill" id="pageCount">0 páginas</span><span class="pill">versão limpa</span></div>
      </div>
      <div class="thumbs" id="thumbs"></div>
      <div class="note">Use as setas do teclado para navegar. O zoom e o modo foco ficam salvos enquanto a página estiver aberta.</div>
    </aside>
    <main>
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="mobile-menu" onclick="toggleMenu()">☰ Páginas</button>
          <button onclick="prevPage()">← Anterior</button>
          <div class="page-state" id="pageState">1 / 1</div>
          <button onclick="nextPage()">Próxima →</button>
        </div>
        <div class="toolbar-right">
          <button onclick="zoomOut()">− Zoom</button>
          <button onclick="resetZoom()" id="zoomLabel">100%</button>
          <button onclick="zoomIn()">+ Zoom</button>
          <button onclick="toggleFocus()">Modo foco</button>
          <button class="primary" onclick="toggleFullScreen()">Tela cheia</button>
        </div>
      </div>
      <div class="stage-wrap" id="stageWrap">
        <div class="stage">
          <div class="page-card" id="pageCard">
            <img id="pageImg" alt="Página do material" />
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    const PAGES = ["assets/page-001.webp", "assets/page-002.webp", "assets/page-003.webp", "assets/page-004.webp", "assets/page-005.webp", "assets/page-006.webp", "assets/page-007.webp", "assets/page-008.webp", "assets/page-009.webp", "assets/page-010.webp", "assets/page-011.webp", "assets/page-012.webp", "assets/page-013.webp", "assets/page-014.webp", "assets/page-015.webp", "assets/page-016.webp", "assets/page-017.webp", "assets/page-018.webp", "assets/page-019.webp", "assets/page-020.webp"];
    const DIMS = [{"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}, {"w": 1150, "h": 647}];
    let current = 0;
    let zoom = 1;
    const thumbs = document.getElementById('thumbs');
    const pageImg = document.getElementById('pageImg');
    const pageState = document.getElementById('pageState');
    const pageCount = document.getElementById('pageCount');
    const zoomLabel = document.getElementById('zoomLabel');
    const stageWrap = document.getElementById('stageWrap');
    const pageCard = document.getElementById('pageCard');

    pageCount.textContent = `${PAGES.length} página${PAGES.length === 1 ? '' : 's'}`;

    function renderThumbs() {
      thumbs.innerHTML = PAGES.map((src, i) => `
        <button class="thumb ${i === current ? 'active' : ''}" onclick="goTo(${i})">
          <img loading="lazy" src="${src}" alt="Miniatura página ${i + 1}" />
          <span>Página ${String(i + 1).padStart(2, '0')}</span>
        </button>`).join('');
    }

    function renderPage() {
      pageImg.src = PAGES[current];
      pageState.textContent = `${current + 1} / ${PAGES.length}`;
      const dim = DIMS[current] || {w: 1000, h: 700};
      pageCard.style.setProperty('--page-width', `${dim.w}px`);
      pageCard.style.setProperty('--zoom', zoom);
      zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
      [...document.querySelectorAll('.thumb')].forEach((el, i) => el.classList.toggle('active', i === current));
      stageWrap.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
    }

    function goTo(i) { current = Math.max(0, Math.min(PAGES.length - 1, i)); renderPage(); document.body.classList.remove('menu-open'); }
    function prevPage() { goTo(current - 1); }
    function nextPage() { goTo(current + 1); }
    function zoomIn() { zoom = Math.min(2.5, +(zoom + 0.1).toFixed(2)); renderPage(); }
    function zoomOut() { zoom = Math.max(0.35, +(zoom - 0.1).toFixed(2)); renderPage(); }
    function resetZoom() { zoom = 1; renderPage(); }
    function toggleFocus() { document.body.classList.toggle('focus'); }
    function toggleMenu() { document.body.classList.toggle('menu-open'); }
    function toggleFullScreen() {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextPage();
      if (e.key === 'ArrowLeft') prevPage();
      if (e.key === '+') zoomIn();
      if (e.key === '-') zoomOut();
      if (e.key === 'Escape') document.body.classList.remove('menu-open');
    });
    renderThumbs();
    renderPage();
  </script>
</body>
</html>
